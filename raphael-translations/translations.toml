["seCI2n41FD+21Bg6X3etyQ=="]
en = '''Find a rotation that can reach the target quality no matter how unlucky the random conditions are.\n  - May decrease achievable Quality.\n  - May increase macro duration.\n  - Much longer solve time.\nThe solver never tries to use Tricks of the Trade to \"eat\" Excellent quality procs, so in some cases this option does not produce the optimal macro.'''
ja = '''ランダム条件が不運でも目標品質に到達できるスキル回しを見つけます。\n  - 達成可能な品質が下がる可能性があります。\n  - マクロ時間が長くなる可能性があります。\n  - 計算時間が大幅に長くなる可能性があります。\nソルバーは「秘訣」を使って優れた品質発生を消費することはないため、このオプションでは最適なマクロが得られない場合があります。'''
de = '''Rotation finden, bei der die gewünschte Qualität erreicht wird, egal welche zufälligen Zustände bei der Synthese auftauchen.\n  - Verringert möglicherweise die erreichte Qualität.\n  - Das Macro ist möglicherweise länger.\n  - Lösen dauert deutlich länger.\n  - Raphael wird Kunstgriff nicht nutzen, um Exzellent-Zustände zu tilgen, was möglicherweise zu suboptimalen Macros führt.'''
chs = '''找出能确保无论运气多差，出现何种制作状态均能保证达到目标品质的手法。\n  - 可能导致可达到的品质更低。\n  - 可能导致宏的长度更长。\n  - 求解所需的时间长得多。\n求解器不会尝试用秘诀技能“吃掉”最高品质状态，所以部分情况下这个选项不会产生最优的宏。'''
tc = '''找出能確保無論運氣多差，出現何種製作狀態均能保證達到目標品質的手法。\n  - 可能導致可達到的品質更低。\n  - 可能導致巨集的長度更長。\n  - 求解所需的時間更久。\n求解器不會嘗試用秘訣技能“吃掉”最高品質狀態，所以部分情況下這個選項不會產生最優的巨集。'''
ko = '''저품질 비레고로 인한 품질 하락을 방지합니다.\n - 달성 가능한 품질이 하락할 가능성이 있습니다.\n - 매크로의 작업시간이 길어질 가능성이 있습니다.\n - 계산시간이 대폭 늘어날 가능성이 있습니다.\n - 계산기가 '비결'을 사용해서 품질을 더 올릴수는 없기때문에, 이 옵션이 최적의 매크로를 생성하지 못할 가능성이 있습니다.'''
version = "0.1.0"
appearances = ["src/app.rs:952:45"]

["+DwRW5ozbiRozBNupYmv0A=="]
en = '''⚠ EXPERIMENTAL FEATURE\nThis option may use a lot of memory (sometimes well above 4GB) which may cause your system to run out of memory.'''
ja = '''⚠ 実験的機能\nこのオプションは大量のメモリを使用する可能性があります（場合によっては4GB以上）、システムがメモリ不足になることがあります。'''
