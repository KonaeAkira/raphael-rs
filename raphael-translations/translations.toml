ts = '''僅考慮在巨集的最後使用作業技能的手法。\n  - 可能導致可達到的品質更低。\n  - 可能導致巨集的長度更長。'''
ko = '''매크로의 뒷부분에서만 작업을 진행합니다.\n - 달성 가능한 품질이 하락할 가능성이 있습니다.\n - 매크로의 작업시간이 길어질 가능성이 있습니다.'''
version = "0.1.0"
appearances = ["src/app.rs:938:45"]

