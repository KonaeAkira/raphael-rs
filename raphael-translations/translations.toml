["u8MNP8lLoB18+dt06cfdzQ=="]
en = '''The format can be any arbitrary text or FFXIV command.\n\nThe following placeholders can be used to output their respective value:\n  - {index} : the index or number of the macro block\n  - {max_index} : the maximum index or number of macro blocks\n  - {item_name} : the name of the selected recipe's item result\n  - {food} : the name of the selected food\n  - {potion} : the name of the selected potion\n  - {craftsmanship} : the base craftsmanship stat\n  - {control} : the base control stat\n  - {cp} : the base CP stat'''
ja = '''形式は任意のテキストまたはFFXIVコマンドを使用できます。\n\n以下のプレースホルダーで各値を出力できます：\n  - {index} : マクロブロックの番号\n  - {max_index} : マクロブロックの最大番号\n  - {item_name} : 選択したレシピのアイテム名\n  - {food} : 選択した調理品の名前\n  - {potion} : 選択した薬品の名前\n  - {craftsmanship} : 基本作業精度ステータス\n  - {control} : 基本加工精度ステータス\n  - {cp} : 基本CP'''
de = '''Das Format kann jeglicher Text oder FFXIV Kommando sein.\n\nDie folgenden Variablen können genutzt werden um ihre jeweiligen Werte auszugeben\n   - {index} : Der Index (/ die Nummer) des Macroblocks\n   - {max_index} : Der maximale Index des Macroblocks\n   - {item_name} : Der Name des Gegenstandes, welcher mit dem derzeitig ausgewählten Rezept hergestellt wird\n   - {food} : Name des derzeitig ausgewählten Gerichts\n   - {potion} : Name der derzeitig ausgewählten Arznei\n   - {craftsmanship} : Unmodifiziertes Kunstfertigkeits Attribut\n   - {control} : Unmodifiertes Kontrolle Attribut\n   - {cp} : Unmodifiziertes HP Attribut'''
chs = '''格式可以是任意文本或FF14的文本指令。\n\n下列占位符可以用于输出对应的值：\n  - {index}：当前宏块的索引\n  - {max_index}：宏块的最大索引\n  - {item_name}：当前配方对应的物品名称\n  - {food}：选择的食物的名称\n  - {potion}：选择的药品的名称\n  - {craftsmanship}：基础作业精度\n  - {control}：基础加工精度\n  - {cp}：基础制作力'''
tc = '''格式可以是任意文字或FFXIV指令。\n\n以下的佔位符可用來輸出其對應的數值：\n  - {index}：巨集區塊的索引或編號\n  - {max_index}：巨集區塊的最大索引或編號\n  - {item_name}：所選配方的物品名稱\n  - {food}：所選料理的名稱\n  - {potion}：所選藥品的名稱\n  - {craftsmanship}：基礎作業精度屬性\n  - {control}：基礎加工精度屬性\n  - {cp}：基礎CP屬性'''
ko = '''입력 형식은 원하는 문자열이나 FFXIV의 커맨드를 사용할 수 있습니다.\n\n아래 플레이스홀더를 사용해서 각종 출력이 가능합니다:\n  - {index} : 매크로 번호\n  - {max_index} : 매크로 개수\n  - {item_name} : 선택한 아이템 이름\n  - {food} : 선택한 음식의 이름\n  - {potion} : 선택한 약품의 이름\n  - {craftsmanship} : 작업 숙련도 수치\n  - {control} : 가공 숙련도 수치\n  - {cp} : 기본 CP'''
version = "0.1.0"
appearances = ["src/widgets/macro_view.rs:16:9"]

