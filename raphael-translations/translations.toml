["p7HyJWFYYWHKe39OAg2LrQ=="]
en = '''Reduce memory usage by skipping candidate solutions that cannot reach the target quality. Basically, you either get a solution that reaches the target quality or you get no solution at all. If you want to know how close you are to reaching the target quality, keep this option turned off.'''
ja = '''目標品質に到達できない候補解をスキップして、メモリ使用量を削減します。基本的には、目標品質に到達する解が得られるか、解が得られないかのどちらかです。目標品質にどれだけ近いか確認したい場合は、このオプションをオフにしてください。'''
de = '''Verringer Arbeitsspeicherverbrauch durch Eliminierung von sämtlichen Lösungen, welche die Ziel-Qualität nicht erreichen. Schalte diese Option aus, wenn um eine Rotation zu finden, welche so nah wie möglich an die Ziel-Qualität heran kommen.'''
chs = '''通过跳过无法达到目标品质的候选解决方案来减少内存使用。基本上，要么得到一个达到目标品质的解决方案，要么根本没有解决方案。如果想知道距离达到目标品质的距离，请保持该选项关闭。'''
tc = '''透過無視無法達到目標品質的候選解法來減少記憶體使用量。基本上，要麼得到一個達到目標品質的解，否則就沒有解。如果想知道距離達到目標品質的差距，請保持該選項關閉。'''
ko = '''목표 품질에 도달하지 못하는 경우를 제외해서 메모리 사용량을 줄입니다. 기본적으로는 목표 품질을 달성하거나, 매크로를 완성하지 못합니다. 목표 품질을 어느정도까지 달성할수 있는지 확인하고 싶은 경우에는, 이 옵션을 꺼주세요.'''
version = "0.1.0"
appearances = ["src/app.rs:930:45"]

