tc = '''⚠ 實驗性功能\n此選項可能會使用大量記憶體（有時甚至超過4GB），可能導致系統記憶體不足。'''
ko = '''⚠ 실험실 기능\n이 옵션은 메모리를 많이 사용할 가능성이 있습니다 (경우에 따라서 4GB 이상): 시스템의 메모리가 부족하게 되는 경우가 있습니다.'''
